<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Configuración de Estación IoT</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>.navbar-custom { background-color: #1e293b !important; } .nav-link i { margin-right: 6px; }</style>
</head>
<body style="background-color: #f4f6f9;">
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand font-weight-bold" href="/dashboard"><i class="fas fa-chart-area"></i> FluvialAI Edge</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item"><a class="nav-link font-weight-bold" href="/dashboard"><i class="fas fa-chart-bar"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link font-weight-bold" href="/audit"><i class="fas fa-history"></i> Auditoría de Campo</a></li>
                    <li class="nav-item active"><a class="nav-link font-weight-bold" href="/settings"><i class="fas fa-cog"></i> Configuración</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow rounded mb-4">
                    <div class="card-header bg-dark text-white font-weight-bold"><i class="fas fa-sliders-h"></i> Calibración Completa (config.xml)</div>
                    <div class="card-body">
                        <div id="alert-box"></div>
                        <form id="config-form">
                            <h5 class="text-secondary border-bottom pb-2 mb-3">Parámetros Hidrológicos</h5>
                            <div class="form-group row">
                                <label class="col-sm-4 col-form-label font-weight-bold">Intervalo (s):</label>
                                <div class="col-sm-8"><input type="number" class="form-value form-control" id="interval" value="__INTERVAL__" min="1"></div>
                            </div>
                            <div class="form-group row">
                                <label class="col-sm-4 col-form-label font-weight-bold">Altura Sensor (m):</label>
                                <div class="col-sm-8"><input type="number" step="0.01" class="form-value form-control" id="altura" value="__ALTURA__"></div>
                            </div>
                            <div class="form-group row">
                                <label class="col-sm-4 col-form-label font-weight-bold">Caudal Máximo (m³/s):</label>
                                <div class="col-sm-8"><input type="number" step="0.1" class="form-value form-control" id="caudal" value="__CAUDAL__"></div>
                            </div>
                            <div class="form-group row">
                                <label class="col-sm-4 col-form-label font-weight-bold">Modo Operativo:</label>
                                <div class="col-sm-8">
                                    <select class="form-control" id="test_mode">
                                        <option value="false" __SELECT_FISICO__>Físico (Sensor PWM Activo)</option>
                                        <option value="true" __SELECT_SIMULADO__>Simulado (Modo Test)</option>
                                    </select>
                                </div>
                            </div>
                            
                            <h5 class="text-secondary border-bottom pb-2 mt-4 mb-3">Infraestructura y Cloud AWS</h5>
                            <div class="form-group row">
                                <label class="col-sm-4 col-form-label font-weight-bold">Pin GPIO PWM (BCM):</label>
                                <div class="col-sm-8"><input type="number" class="form-value form-control" id="pin_pwm" value="__PIN_PWM__"></div>
                            </div>
                            <div class="form-group row">
                                <label class="col-sm-4 col-form-label font-weight-bold">URL Descarga AWS (GET):</label>
                                <div class="col-sm-8"><input type="url" class="form-value form-control" id="aws_fetch_url" value="__AWS_FETCH__"></div>
                            </div>
                            <div class="form-group row">
                                <label class="col-sm-4 col-form-label font-weight-bold">URL Carga AWS (POST):</label>
                                <div class="col-sm-8"><input type="url" class="form-value form-control" id="aws_push_url" value="__AWS_PUSH__"></div>
                            </div>
                            
                            <hr>
                            <button type="button" class="btn btn-primary btn-block font-weight-bold" onclick="saveConfig()"><i class="fas fa-save"></i> Guardar Todo y Aplicar en Caliente</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function saveConfig() {
            const payload = {
                polling_interval_seconds: parseInt(document.getElementById('interval').value),
                test_mode: document.getElementById('test_mode').value === 'true',
                max_caudal_calibracion: parseFloat(document.getElementById('caudal').value),
                altura_sensor_instalado_metros: parseFloat(document.getElementById('altura').value),
                pin_pwm_gpio: parseInt(document.getElementById('pin_pwm').value),
                aws_fetch_url: document.getElementById('aws_fetch_url').value,
                aws_push_url: document.getElementById('aws_push_url').value
            };
            const alertBox = document.getElementById('alert-box');
            try {
                const response = await fetch('/update-config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await response.json();
                if (response.ok) { alertBox.innerHTML = '<div class="alert alert-success font-weight-bold">🎉 ' + data.message + '</div>'; }
                else { alertBox.innerHTML = '<div class="alert alert-danger font-weight-bold">❌ Error: ' + data.message + '</div>'; }
            } catch (e) { alertBox.innerHTML = '<div class="alert alert-danger font-weight-bold">❌ Error de red.</div>'; }
        }
    </script>
</body>
</html>
